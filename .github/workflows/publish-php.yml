name: Publish PHP (Packagist webhook)

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Push subtree to zeromcp-php
        run: |
          SHA=$(git subtree split --prefix=php HEAD)
          git push "https://x-access-token:${{ secrets.SUBTREE_PAT }}@github.com/antidrift-dev/zeromcp-php.git" "$SHA:refs/heads/main" --force
          git push "https://x-access-token:${{ secrets.SUBTREE_PAT }}@github.com/antidrift-dev/zeromcp-php.git" "$SHA:refs/tags/${{ github.ref_name }}" --force
