name: Publish Swift (subtree push)

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Push subtree to zeromcp-swift
        run: |
          SHA=$(git subtree split --prefix=swift HEAD)
          git push "https://x-access-token:${{ secrets.PAT_SUBTREE }}@github.com/antidrift-dev/zeromcp-swift.git" "$SHA:refs/heads/main" --force
          git push "https://x-access-token:${{ secrets.PAT_SUBTREE }}@github.com/antidrift-dev/zeromcp-swift.git" "$SHA:refs/tags/${{ github.ref_name }}" --force
