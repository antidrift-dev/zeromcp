name: Publish Go (subtree push)

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_SUBTREE }}

      - name: Push subtree to zeromcp-go
        run: |
          git config --global credential.helper store
          echo "https://x-access-token:${{ secrets.PAT_SUBTREE }}@github.com" > ~/.git-credentials
          SHA=$(git subtree split --prefix=go HEAD)
          git push "https://github.com/antidrift-dev/zeromcp-go.git" "$SHA:refs/heads/main" --force
          git push "https://github.com/antidrift-dev/zeromcp-go.git" "$SHA:refs/tags/${{ github.ref_name }}" --force
