name: Publish Go (subtree push)

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
          token: ${{ secrets.PAT_SUBTREE }}

      - name: Push subtree to zeromcp-go
        env:
          PAT: ${{ secrets.PAT_SUBTREE }}
        run: |
          SHA=$(git subtree split --prefix=go HEAD)
          git -c http.extraheader="Authorization: token $PAT" push "https://github.com/antidrift-dev/zeromcp-go.git" "$SHA:refs/heads/main" --force
          git -c http.extraheader="Authorization: token $PAT" push "https://github.com/antidrift-dev/zeromcp-go.git" "$SHA:refs/tags/${{ github.ref_name }}" --force
